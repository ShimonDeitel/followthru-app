name: Followthru
options:
  bundleIdPrefix: com.shimondeitel.followthru
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Followthru:
    type: application
    platform: iOS
    sources:
      - path: Followthru
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.followthru
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Followthru/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FollowthruTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FollowthruTests
      - path: Followthru.storekit
    dependencies:
      - target: Followthru
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.followthru.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FollowthruUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FollowthruUITests
    dependencies:
      - target: Followthru
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.followthru.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Followthru:
    build:
      targets:
        Followthru: all
        FollowthruTests: [test]
        FollowthruUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Followthru.storekit
    test:
      config: Debug
      storeKitConfiguration: Followthru.storekit
      targets:
        - FollowthruTests
        - FollowthruUITests
    archive:
      config: Release
